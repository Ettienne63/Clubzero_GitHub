
app = "clubzero"
primary_region = "iad"

[env]
  UPLOAD_DIR = '/data/uploads'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[deploy]
  release_command = "npx prisma migrate deploy"

[[mounts]]
  source = 'uploads_data_recovery'
  destination = '/data'
