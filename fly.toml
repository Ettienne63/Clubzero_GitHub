
app = "clubzero"

[env]
  UPLOAD_DIR = '/data/uploads'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[deploy]
  release_command = "npx prisma migrate deploy"

[[mounts]]
  source = 'uploads_data'
  destination = '/data'
