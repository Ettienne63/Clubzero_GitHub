services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clubzero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      PORT: 3000
      SESSION_SECRET: dev-secret-change-me
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clubzero?schema=public
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data:
  uploads_data:
