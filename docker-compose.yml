services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clubzero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET}
      DB_SCHEMA: ${DB_SCHEMA}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clubzero?schema=${DB_SCHEMA}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - uploads_data:/app/public/uploads
    command: sh ./scripts/docker-dev-start.sh

volumes:
  app_node_modules:
  postgres_data:
  uploads_data:
